<body>
<div class="box">
    <h1>Client for "Silero TTS Real-time Server"</h1>

    <div class="server-box">

    </div>

        <tr>
            <td width="50%" style="padding-right: 6px;">
                <div class="speaker-panel">
                    <div style="font-weight: bold; margin-bottom: 6px;">
                        <a href="#" onclick="loadSpeakersFromServer(); return false;" style="font-size: 12px; font-weight: bold;">Обновить список голосов</a>
                        <br>
                        Голоса (с индивидуальными настройками):
                    </div>
                    <div id="speaker-options"></div>
                </div>
              </td>
            <td width="50%">
                <div class="param-panel">

                    <div class="param-row">
                        <span class="param-label">Speed:</span>
                        <div class="spin-group">
                            <button type="button" id="speed-minus">-</button>
                            <input type="text" id="speed" value="0.0" readonly size="5">
                            <button type="button" id="speed-plus">+</button>
                        </div>
                        <span class="value-tip">-10..10</span>
                    </div>
                    <div class="param-row">
                        <span class="param-label">Pitch:</span>
                        <div class="spin-group">
                            <button type="button" id="pitch-minus">-</button>
                            <input type="text" id="pitch" value="0.0" readonly size="5">
                            <button type="button" id="pitch-plus">+</button>
                        </div>
                        <span class="value-tip">-10..10</span>
                    </div>
                    <div class="stream-checkbox">
                        <label>
                            <input type="checkbox" id="stream-mode" checked="checked">
                            <b>Режим потока (ускоряет начало воспроизведения)</b>

    <div class="row" style="margin-top: 5px;">

        <label><input type="radio" name="example" value="4"> Пример 4</label>

<script type="text/javascript">
    var VOICE_PRESETS = {};
    var SPEAKERS = [];
    
    var speedValue = 0.0;
    var pitchValue = 0.0;
    var currentSpeakerId = 0;
    
    var serverUrlInput = document.getElementById('server-url');
    var textarea = document.getElementById('text');

    var speedInput = document.getElementById('speed');

    var speedMinus = document.getElementById('speed-minus');
    var speedPlus = document.getElementById('speed-plus');
    var pitchMinus = document.getElementById('pitch-minus');
    var pitchPlus = document.getElementById('pitch-plus');
    var statusMsg = document.getElementById('status-msg');
    var audioPlayer = document.getElementById('audio-player');
    var finalSpeedSpan = document.getElementById('final-speed');
    var finalPitchSpan = document.getElementById('final-pitch');
    var finalVolSpan = document.getElementById('final-vol');
    var streamCheckbox = document.getElementById('stream-mode');
    var progressBar = document.getElementById('progress-bar');
    var progressFill = document.getElementById('progress-fill');
    
    var exampleTexts = {
        "1": "Ехал Грека через реку, видит Грека — в реке рак. Сунул Грека руку в реку, рак за руку Греку — цап! Мышка сушек насушила, мышка мышек пригласила, мышки сушки кушать стали, з+убки сразу же сломали.",
        "2": "Что? Не может быть! Да это же просто великолепно... Ой, подожди, я ошибся.",
        "3": "Для выхода на низкую околоземную орбиту требуется скорость примерно 7,9 километра в секунду. Системы жизнеобеспечения корабля «Восток-1» работали в штатном режиме, несмотря на перепады температур от минус ста до плюс ста градусов.",
        "4": "Он установил Windows 11, запустил файл test_v5.mp3 и переключился на Wi-Fi 6. Hello World! 123.456 тест-драйв... что будет? (может быть) [или нет] 1/2 круга & 5% скидка.",
        "5": "У меня 2 яблока, 3 груши и 5% апельсинов. Полтора землекопа выкопали 2,5 метра канавы за 3,5 часа. Это стоит 1500 рублей или 1.5 тысячи? 99,9% что это работает! Сегодня 15 марта 2024 года, время 14 часов 30 минут. Встреча назначена на 25.12.2024 в 18:45. Я родился 1 января 2000 года. Мне 1,5 года или полтора года?",
        "6": "Охотник на скатов «Флирт с ангельским огнем», как и большинство кораблей такого типа, в море казался злым и лихим. Наполовину военное судно, наполовину гоночный ялик-переросток, сочетавший центр тяжести в остром киле и неправдоподобные мощности грав-силы в двойных капсулах на аутригерах, – в первую очередь он был построен для беспечной скорости и пиратства. Слоновые скаты и их родственники поменьше – быстры в воде, но важнее то, что их мясо портится, если оставить его надолго без обработки. Можно заморозить туши и торговать спокойно, но если успеешь домчать до больших рынков в таких финансовых центрах, как Миллспорт, то сорвешь настоящий куш. А для этого нужно быстроходное судно. Судостроители по всему Харлану понимали и исходили из этого. Среди тех же судостроителей ходило негласное понимание, что лучшие слоновые скаты обитают и нерестятся в угодьях, отведенных эксклюзивно для Первых Семей. Браконьерство – серьезное преступление, и если хочешь, чтобы оно сошло тебе с рук, быстроходному судну также нужен низкий и малозаметный профиль – как визуально, так и на радаре. Если надо сбежать от правоохранителей Харлана, найдется много способов хуже, чем на борту охотника. На второй день в море, обнадеженный знанием, что мы уже так далеко от Миллспортского архипелага и нас не догонит ни один воздушный аппарат, я вышел на палубу и встал на левом мостке аутригера, глядя, как подо мной проносится пенящийся океан. Брызги на ветру и ощущение, что события летят на меня слишком быстро, чтобы их осознать. Прошлое и груз смертей оставались в кильватере, унося с собой выбор и решения, которые уже поздно менять."
    };
    
    function showStatus(msg, isError) {
        statusMsg.innerHTML = msg;
        statusMsg.style.display = 'block';
        statusMsg.style.background = isError ? '#FFCCCC' : '#CCFFCC';
    }
    
    // Загрузка списка голосов с сервера
    async function loadSpeakersFromServer() {
        var server = serverUrlInput.value;
        if (!server) return false;
        
        try {
            var response = await fetch(server + '/speakers');
            if (!response.ok) throw new Error('HTTP ' + response.status);
            var data = await response.json();
            
            if (data && data.silero && Array.isArray(data.silero)) {
                // Обновляем список голосов
                SPEAKERS = data.silero.map(function(spk, idx) {
                    return {
                        id: spk.id,
                        name: spk.name,
                        display: spk.id + " " + spk.name + " " + (spk.gender || 'n/d') + " " + (spk.lang || 'n/d')
                    };
                });
                
                // Создаем пресеты для каждого голоса
                VOICE_PRESETS = {};
                for (var i = 0; i < SPEAKERS.length; i++) {
                    var spk = SPEAKERS[i];
                    // Базовые настройки для всех голосов
                    var preset = {
                        "vol_boost": 0,
                        "base_speed": 100,
                        "base_pitch": "medium",
                        "name": spk.name,
                        "gender": spk.gender
                    };
                    
                    // Индивидуальные настройки для известных голосов
                    if (spk.name === "aidar") {
                        preset.vol_boost = 0;
                        preset.base_speed = 119;
                        preset.base_pitch = "high";
                    } else if (spk.name === "baya") {
                        preset.vol_boost = 1.5;
                        preset.base_speed = 100;
                        preset.base_pitch = "low";
                    } else if (spk.name === "kseniya") {
                        preset.vol_boost = 0;
                        preset.base_speed = 100;
                        preset.base_pitch = "medium";
                    } else if (spk.name === "eugene") {
                        preset.vol_boost = -1;
                        preset.base_speed = 89;
                        preset.base_pitch = "high";
                    } else if (spk.name === "xenia") {
                        preset.vol_boost = 0.5;
                        preset.base_speed = 100;
                        preset.base_pitch = "medium";
                    } else if (spk.name === "RANDOM") {
                        preset.vol_boost = 0;
                        preset.base_speed = 100;
                        preset.base_pitch = "medium";
                    } else if (spk.name === "HASH") {
                        preset.vol_boost = 0;
                        preset.base_speed = 100;
                        preset.base_pitch = "medium";
                    }
                    
                    VOICE_PRESETS[spk.id] = preset;
                }
                
                renderSpeakers();
                return true;
            }
        } catch (error) {
            console.warn('Failed to load speakers:', error);
            return false;
        }
        return false;
    }
    
    function renderSpeakers() {
        var container = document.getElementById('speaker-options');
        if (!container) return;
        var html = '';
        for (var i = 0; i < SPEAKERS.length; i++) {
            var spk = SPEAKERS[i];
            var preset = VOICE_PRESETS[spk.id];
            var presetText = '';
            if (preset && spk.name !== 'RANDOM' && spk.name !== 'HASH' && spk.name !== 'RANDOM_M' && spk.name !== 'RANDOM_F') {
                presetText = '<span class="speaker-preset-info">vol=' + preset.vol_boost + 
                            'dB | spd=' + preset.base_speed + 
                            '% | ptch=' + preset.base_pitch + '</span>';
            } else if (spk.name === 'RANDOM') {
                presetText = '<span class="speaker-preset-info">случайный голос</span>';
            }else if (spk.name === 'RANDOM_M') {
                presetText = '<span class="speaker-preset-info">случайный мужской голос</span>';
            }else if (spk.name === 'RANDOM_F') {
                presetText = '<span class="speaker-preset-info">случайный женский голос</span>';
            } else if (spk.name === 'HASH') {
                presetText = '<span class="speaker-preset-info">выбор голоса зависит от текста</span>';
            }
            var checkedAttr = (i === 0 && currentSpeakerId === spk.id) ? ' checked="checked"' : '';
            html += '<div class="speaker-item" onclick="document.getElementById(\'spk_' + spk.id + '\').click();">' +
                    '<input type="radio" name="speaker" id="spk_' + spk.id + '" value="' + spk.id + '"' + checkedAttr + ' />' +
                    '<label for="spk_' + spk.id + '"> <b>' + spk.display + '</b></label>' +
                    presetText +
                    '</div>';
        }
        container.innerHTML = html;
        
        var radios = document.getElementsByName('speaker');
        for (var r = 0; r < radios.length; r++) {
            radios[r].onclick = function() { 
                currentSpeakerId = parseInt(this.value, 10);
                updateFinalParams();
                updateUrlPreview();
            };
        }
        
        if (SPEAKERS.length > 0 && currentSpeakerId === 0) {
            currentSpeakerId = SPEAKERS[0].id;
        }
        updateFinalParams();
    }
    
    async function restartServer() {
        var server = serverUrlInput.value;
        if (!server) {
            alert('Введите URL сервера');
            return;
        }
        
        showStatus('Отправка запроса на перезагрузку сервера...', false);
        
        try {
            var response = await fetch(server + '/restart', {method: 'POST'});
            if (response.ok) {
                showStatus('Сервер перезагружается... Подождите ~10 секунд или обновите список голосов вручную', false);
                // Ждем перезагрузки и обновляем список голосов
                setTimeout(function() {
                    loadSpeakersFromServer();
                }, 10000);
            } else {
                var errorText = await response.text();
                showStatus('Ошибка перезагрузки: ' + errorText, true);
            }
        } catch (error) {
            showStatus('Ошибка: ' + error.message + ' (сервер может быть недоступен во время перезагрузки)', true);
            // Все равно пробуем обновить список через несколько секунд
            setTimeout(function() {
                loadSpeakersFromServer();
            }, 10000);
        }
    }
    
    function getSelectedSpeakerId() {
        return currentSpeakerId;
    }
    
    function getFinalSpeedPercent() {
        var preset = VOICE_PRESETS[currentSpeakerId];
        if (!preset) return 100;
        
        var baseSpeed = preset.base_speed;
        var speedPercent;
        
        if (speedValue > 0) {
            speedPercent = baseSpeed + speedValue * 20;
        } else {
            speedPercent = baseSpeed + speedValue * 6;
        }
        
        speedPercent = Math.max(40, Math.min(300, speedPercent));
        return Math.round(speedPercent);
    }
    
    function getFinalPitchLevel() {
        var preset = VOICE_PRESETS[currentSpeakerId];
        if (!preset) return "medium";
        
        var pitchLevels = ["x-low", "low", "medium", "high", "x-high"];
        var baseIdx = pitchLevels.indexOf(preset.base_pitch);
        if (baseIdx === -1) baseIdx = 2;
        
        var delta = Math.round((pitchValue + 10) / 20 * 4) - 2;
        var pitchIndex = Math.max(0, Math.min(4, baseIdx + delta));
        
        return pitchLevels[pitchIndex];
    }
    
    function getFinalVolBoost() {
        var preset = VOICE_PRESETS[currentSpeakerId];
        return preset ? preset.vol_boost : 0;
    }
    
    function isStreamMode() {
        return streamCheckbox.checked;
    }
    
    function updateFinalParams() {
        var finalSpeed = getFinalSpeedPercent();
        var finalPitch = getFinalPitchLevel();
        var finalVol = getFinalVolBoost();
        
        finalSpeedSpan.innerHTML = 'speed: ' + finalSpeed + '%';
        finalPitchSpan.innerHTML = 'pitch: ' + finalPitch;
        finalVolSpan.innerHTML = 'vol_boost: ' + finalVol + ' dB';
    }
    
    function updateSpeedUI() {
        var rounded = Math.round(speedValue * 10) / 10;
        speedInput.value = rounded.toFixed(1);
        updateFinalParams();
        updateUrlPreview();
    }
    
    function clampSpeed(val) {
        if (val < -10) return -10;
        if (val > 10) return 10;
        return val;
    }
    
    function changeSpeed(delta) {
        var newSpeed = speedValue + delta;
        newSpeed = Math.round(newSpeed * 10) / 10;
        speedValue = clampSpeed(newSpeed);
        updateSpeedUI();
    }
    
    function updatePitchUI() {
        var rounded = Math.round(pitchValue * 10) / 10;
        pitchInput.value = rounded.toFixed(1);
        updateFinalParams();
        updateUrlPreview();
    }
    
    function clampPitch(val) {
        if (val < -10) return -10;
        if (val > 10) return 10;
        return val;
    }
    
    function changePitch(delta) {
        var newPitch = pitchValue + delta;
        newPitch = Math.round(newPitch * 10) / 10;
        pitchValue = clampPitch(newPitch);
        updatePitchUI();
    }
    
    function buildRequestUrl() {
        var server = serverUrlInput.value;
        var text = textarea.value;
        if (!server || !text) return null;
        server = server.replace(/^\s+|\s+$/g, '');
        text = text.replace(/^\s+|\s+$/g, '');
        if (server === '' || text === '') return null;
        
        var speakerId = getSelectedSpeakerId();
        var speedParam = getFinalSpeedPercent();
        var pitchParam = getFinalPitchLevel();
        var volParam = getFinalVolBoost();
        
        var url;
		if (isStreamMode()) {
            url = server + '/speak/stream?';
        } else {
			url = server + '/speak?';
		}
        url += 'text=' + encodeURIComponent(text);
        url += '&id=' + encodeURIComponent(speakerId);
        url += '&speed=' + encodeURIComponent(speedParam);
        url += '&pitch=' + encodeURIComponent(pitchParam);
        url += '&vol_boost=' + encodeURIComponent(volParam);
        return url;
    }
    
    function updateUrlPreview() {
        var url = buildRequestUrl();
        if (!url) {
            urlPreviewDiv.innerHTML = '[X] Заполните текст и укажите URL сервера';
            return;
        }
        urlPreviewDiv.innerHTML = url;
    }
    
    function openInBrowser() {
        var server = serverUrlInput.value;
        var text = textarea.value;
        if (!server) {
            alert('Введите URL сервера (например http://127.0.0.1:23457)');
            return;
        }
        if (!text) {
            alert('Введите текст для синтеза');
            return;
        }
        var url = buildRequestUrl();
        if (!url) {
            alert('Не удалось сформировать ссылку');
            return;
        }
        
        if (isStreamMode()) {
            fetch(url)
                .then(function(response) {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.blob();
                })
                .then(function(blob) {
                    var downloadUrl = URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = 'silero_tts.wav';
                    a.click();
                    URL.revokeObjectURL(downloadUrl);
                })
                .catch(function(error) {
                    alert('Ошибка: ' + error.message);
                });
        } else {
            window.open(url, '_blank');
        }
    }
    
    async function playAudio() {
        var server = serverUrlInput.value;
        var text = textarea.value;
        if (!server) {
            alert('Введите URL сервера (например http://127.0.0.1:23457)');
            return;
        }
        if (!text) {
            alert('Введите текст для синтеза');
            return;
        }
        var url = buildRequestUrl();
        if (!url) {
            alert('Не удалось сформировать ссылку');
            return;
        }
        
        var streaming = isStreamMode();
        
        showStatus(streaming ? 'Подключение к потоку...' : 'Генерация...', false);
        playBtn.disabled = true;
        openBtn.disabled = true;
        
        if (streaming) {
            progressBar.style.display = 'block';
            progressFill.style.width = '10%';
        }
        
        try {
            audioPlayer.src = url;
            audioPlayer.style.display = 'block';
            audioPlayer.load();
            
            var playPromise = audioPlayer.play();
            
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    if (streaming) {
                        progressFill.style.width = '100%';
                        showStatus('Воспроизведение началось (поток)', false);
                        setTimeout(function() {
                            progressBar.style.display = 'none';
                        }, 500);
                    } else {
                        showStatus('Воспроизведение началось', false);
                    }
                })
                .catch(error => {
                    console.error("Play failed:", error);
                    showStatus('Ошибка воспроизведения: ' + error.message, true);
                    progressBar.style.display = 'none';
                });
            }
            
            audioPlayer.onended = function() {};
        } catch (error) {
            console.error('Error:', error);
            showStatus('Ошибка: ' + error.message, true);
            progressBar.style.display = 'none';
        } finally {
            playBtn.disabled = false;
            openBtn.disabled = false;
        }
    }
    
    function saveServerUrlToCookie() {
        var url = serverUrlInput.value;
        if (url) {
            document.cookie = 'tts_server_ie6=' + encodeURIComponent(url) + '; path=/';
        }
    }
    
    function loadServerUrlFromCookie() {
        var cookies = document.cookie.split(';');
        for (var i = 0; i < cookies.length; i++) {
            var c = cookies[i];
            while (c.charAt(0) === ' ') c = c.substring(1);
            if (c.indexOf('tts_server_ie6=') === 0) {
                var saved = decodeURIComponent(c.substring('tts_server_ie6='.length));
                if (saved) serverUrlInput.value = saved;
                break;
            }
        }
    }
    
    function bindExampleRadios() {
        var exampleRadios = document.querySelectorAll('input[name="example"]');
        for (var i = 0; i < exampleRadios.length; i++) {
            exampleRadios[i].onclick = function() {
                var val = this.value;
                if (exampleTexts[val]) {
                    textarea.value = exampleTexts[val];
                    updateUrlPreview();
                }
            };
        }
    }
    
    function bindEvents() {
        speedMinus.onclick = function() { changeSpeed(-0.5); };
        speedPlus.onclick = function() { changeSpeed(0.5); };
        pitchMinus.onclick = function() { changePitch(-0.5); };
        pitchPlus.onclick = function() { changePitch(0.5); };
        
        serverUrlInput.onkeyup = function() { updateUrlPreview(); };
        serverUrlInput.onchange = function() { saveServerUrlToCookie(); updateUrlPreview(); };
        textarea.onkeyup = function() { updateUrlPreview(); };
        textarea.onchange = function() { updateUrlPreview(); };
        openBtn.onclick = openInBrowser;
        playBtn.onclick = playAudio;
        
        serverUrlInput.onblur = function() { updateUrlPreview(); };
        textarea.onblur = function() { updateUrlPreview(); };
        
        streamCheckbox.onchange = function() { updateUrlPreview(); };
        
        bindExampleRadios();
    }
    
    async function init() {
        loadServerUrlFromCookie();
        await loadSpeakersFromServer();
        speedValue = 0.0;
        pitchValue = 0.0;
        updateSpeedUI();
        updatePitchUI();
        bindEvents();
        updateUrlPreview();
    }
    
    window.onload = init;
</script>
</body>
</html>
